name: Test install.sh

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run tests in Docker
        run: make test

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install and verify
        run: bash test/verify.sh
